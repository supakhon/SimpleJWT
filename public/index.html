<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth System - SQLite & JWT</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div id="auth-section">
            <h2 id="form-title">เข้าสู่ระบบ</h2>
            <div class="form-group">
                <input type="text" id="username" placeholder="ชื่อผู้ใช้งาน">
            </div>
            <div class="form-group">
                <input type="password" id="password" placeholder="รหัสผ่าน">
            </div>
            <button id="main-btn" onclick="handleAuth()">ตกลง</button>
            <p class="toggle-text">
                <span id="toggle-link" onclick="toggleForm()">ยังไม่มีบัญชี? สมัครสมาชิก</span>
            </p>
        </div>

        <div id="profile-section" style="display: none;">
            <h2>ยินดีต้อนรับ</h2>
            <div class="profile-card">
                <p><strong>ID:</strong> <span id="user-id"></span></p>
                <p><strong>ชื่อ:</strong> <span id="user-name"></span></p>
                <p class="status">สถานะ: Token ถูกต้อง</p>
            </div>
            <button class="logout-btn" onclick="logout()">ออกจากระบบ</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
